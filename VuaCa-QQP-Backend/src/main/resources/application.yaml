server:
  port: 8080
  servlet:
    context-path: /VuaCaQPQ
spring:
  application:
    name: VuaCa-QQP-Backend
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  datasource:
    url: "jdbc:mysql://localhost:3306/WebBanCaGit?useUnicode=true&characterEncoding=UTF-8"
    username: "root"
    password: "root"
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

